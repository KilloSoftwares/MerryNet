# ============================================================
# Maranet Zero — Alertmanager Configuration
# ============================================================
# Configure notification channels for Prometheus alerts.
# Update with your actual Slack webhook URL or email settings.
# ============================================================

global:
  # Default Slack channel (override in receiver configs)
  slack_api_url: '${SLACK_WEBHOOK_URL:-}'
  smtp_smarthost: '${SMTP_HOST:-}'
  smtp_from: 'alertmanager@maranet.app'
  smtp_auth_username: '${SMTP_USERNAME:-}'
  smtp_auth_password: '${SMTP_PASSWORD:-}'

# Templates for alert messages
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Routing tree
route:
  # Default receiver
  receiver: 'default-receiver'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  # Routes based on severity
  routes:
    # Critical alerts → immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts → standard notification
    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeat_interval: 4h

    # Info alerts → daily digest
    - match:
        severity: info
      receiver: 'info-alerts'
      repeat_interval: 24h

# Inhibition rules (suppress lower severity if higher exists)
inhibit_rules:
  # If API is down, don't also alert about slow responses
  - source_match:
      alertname: APIDown
    target_match:
      alertname: SlowAPIResponses
    equal: ['severity']

  # If gateway is down, don't alert about high tunnel count
  - source_match:
      alertname: GatewayDown
    target_match:
      alertname: HighTunnelCount
    equal: ['severity']

# Receivers (notification channels)
receivers:
  # Default receiver (Slack)
  - name: 'default-receiver'
    slack_configs:
      - channel: '#maranet-alerts'
        send_resolved: true
        title: '{{ template "slack.default.title" . }}'
        text: '{{ template "slack.default.text" . }}'

  # Critical alerts (Slack + Email)
  - name: 'critical-alerts'
    slack_configs:
      - channel: '#maranet-critical'
        send_resolved: true
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Severity:* {{ .CommonLabels.severity }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Started:* {{ .StartsAt }}
    email_configs:
      - to: 'ops-team@maranet.app'
        send_resolved: true
        subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.default.html" . }}'

  # Warning alerts (Slack only)
  - name: 'warning-alerts'
    slack_configs:
      - channel: '#maranet-alerts'
        send_resolved: true
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Severity:* {{ .CommonLabels.severity }}
          *Summary:* {{ .CommonAnnotations.summary }}

  # Info alerts (Slack, less frequent)
  - name: 'info-alerts'
    slack_configs:
      - channel: '#maranet-info'
        send_resolved: true
        title: 'ℹ️ INFO: {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }}'

# ============================================================
# Notes:
# - Set SLACK_WEBHOOK_URL environment variable for Slack notifications
# - Set SMTP_* variables for email notifications
# - Create /etc/alertmanager/templates/ with custom templates
# ============================================================