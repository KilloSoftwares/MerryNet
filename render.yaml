# render.yaml
services:
  # Main API Server
  - type: web
    name: merry-net-api
    env: docker
    rootDir: main-server
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: merry-net-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: merry-net-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: APP_URL
        value: https://merry-net-api.onrender.com
      - key: CORS_ORIGIN
        value: https://merry-net.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: LLM_SERVICE_URL
        value: https://twin-ai.onrender.com
      - key: HMM_SERVICE_URL
        value: https://twin-ai.onrender.com
      - key: ART_SERVICE_URL
        value: https://twin-ai.onrender.com
      - key: COGNITIVE_API_KEY
        value: twin-dev-key
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
    healthCheckPath: /api/v1/health
    healthCheckTimeout: 120
    autoDeploy: true

  # Bootstrap API
  - type: web
    name: merry-net-bootstrap
    env: docker
    rootDir: bootstrap-api
    plan: free
    region: oregon
    envVars:
      - key: RUST_LOG
        value: info
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: merry-net-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: merry-net-redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          name: merry-net-api
          property: JWT_SECRET
    autoDeploy: true

  # Gateway Service
  - type: web
    name: merry-net-gateway
    env: docker
    rootDir: gateway-service
    plan: free
    region: oregon
    envVars:
      - key: LOG_LEVEL
        value: info
      - key: GRPC_PORT
        value: 50052
      - key: WG_LISTEN_PORT
        value: 51820
      - key: WG_INTERFACE
        value: wg0
      - key: WG_ADDRESS
        value: 10.0.0.1/16
      - key: NAT_EXTERNAL_INTERFACE
        value: eth0
      - key: NAT_INTERNAL_SUBNET
        value: 10.0.0.0/16
    autoDeploy: true

  # Reseller Agent
  - type: web
    name: merry-net-reseller
    env: docker
    rootDir: reseller-agent
    plan: free
    region: oregon
    envVars:
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: 8082
      - key: DATABASE_URL
        fromDatabase:
          name: merry-net-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: merry-net-redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          name: merry-net-api
          property: JWT_SECRET
      - key: LOCAL_API_ENABLED
        value: "true"
      - key: LOCAL_API_OPEN_MODE
        value: "false"
      - key: MAIN_SERVER_PUBLIC_KEY
        sync: false
      - key: GRPC_SERVER_URL
        value: merry-net-api.onrender.com:50051
    autoDeploy: true

databases:
  # Primary Database
  - name: merry-net-db
    plan: free
    region: oregon
    databaseName: merrynet
    user: merrynet_user

  # Redis Cache
  - name: merry-net-redis
    plan: free
    region: oregon

# Cron Jobs
crons:
  - name: cleanup-expired-sessions
    schedule: "0 2 * * *"
    command: curl -X POST https://merry-net-api.onrender.com/api/admin/cleanup-sessions
    timezone: UTC

  - name: backup-database
    schedule: "0 3 * * 0"
    command: curl -X POST https://merry-net-api.onrender.com/api/admin/backup
    timezone: UTC

  - name: update-server-status
    schedule: "*/5 * * * *"
    command: curl -X POST https://merry-net-api.onrender.com/api/admin/update-status
    timezone: UTC