name: Maranet CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.21'
  RUST_VERSION: '1.76'

jobs:
  # ============================================================
  # Main Server (Node.js)
  # ============================================================
  main-server:
    name: Main Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main-server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: maranet_test
          POSTGRES_USER: maranet
          POSTGRES_PASSWORD: test_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: main-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run linter
        run: npm run lint || true

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test || true
        env:
          DATABASE_URL: postgresql://maranet:test_secret@localhost:5432/maranet_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          NODE_ENV: test

      - name: Build
        run: npm run build

      - name: Run database migrations (test)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://maranet:test_secret@localhost:5432/maranet_test

  # ============================================================
  # Gateway Service (Go)
  # ============================================================
  gateway-service:
    name: Gateway Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: gateway-service/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./cmd/gateway

  # ============================================================
  # Reseller Agent (Go)
  # ============================================================
  reseller-agent:
    name: Reseller Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reseller-agent

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: reseller-agent/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=1 go build -o /dev/null ./cmd/agent

  # ============================================================
  # Bootstrap API (Rust)
  # ============================================================
  bootstrap-api:
    name: Bootstrap API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bootstrap-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            bootstrap-api/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('bootstrap-api/Cargo.lock') }}

      - name: Check
        run: cargo check

      - name: Build
        run: cargo build --release

  # ============================================================
  # Docker Images
  # ============================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [main-server, gateway-service, reseller-agent, bootstrap-api]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build main-server image
        uses: docker/build-push-action@v5
        with:
          context: ./main-server
          push: false
          tags: maranet/main-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build gateway-service image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway-service
          push: false
          tags: maranet/gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build bootstrap-api image
        uses: docker/build-push-action@v5
        with:
          context: ./bootstrap-api
          push: false
          tags: maranet/bootstrap:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build reseller-agent image
        uses: docker/build-push-action@v5
        with:
          context: ./reseller-agent
          push: false
          tags: maranet/reseller-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Deploy (manual trigger or main branch)
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ansible
        run: pip install ansible

      - name: Deploy API Server
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ansible-playbook \
            -i deploy/ansible/inventory/hosts.yml \
            deploy/ansible/playbooks/deploy-api.yml \
            --private-key /tmp/deploy_key
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Deploy Gateway
        run: |
          ansible-playbook \
            -i deploy/ansible/inventory/hosts.yml \
            deploy/ansible/playbooks/deploy-gateway.yml \
            --private-key /tmp/deploy_key

      - name: Cleanup
        run: rm -f /tmp/deploy_key
        if: always()
