services:
  - type: web
    name: maranet-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: maranet-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: maranet-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "https://maranet.onrender.com"
      - key: FRONTEND_URL
        value: "https://maranet.onrender.com"
      - key: API_URL
        value: "https://maranet-api.onrender.com"
      - key: BOOTSTRAP_URL
        value: "https://maranet-bootstrap.onrender.com"
      - key: GRPC_HOST
        value: "0.0.0.0"
      - key: GRPC_PORT
        value: "50051"
      - key: LOG_LEVEL
        value: "info"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_SERVICE_URL
        value: "https://twin-ai.onrender.com"
      - key: HMM_SERVICE_URL
        value: "https://twin-ai.onrender.com"
      - key: ART_SERVICE_URL
        value: "https://twin-ai.onrender.com"
      - key: COGNITIVE_API_KEY
        value: "twin-dev-key"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
    healthCheckPath: /api/v1/health
    healthCheckTimeout: 120
    autoDeploy: true

databases:
  - name: maranet-db
    plan: free
    region: oregon
    databaseName: merrynet
    user: merrynet_user

  - name: maranet-redis
    plan: free
    region: oregon

crons:
  - name: cleanup-expired-sessions
    schedule: "0 2 * * *"
    command: curl -X POST https://maranet-api.onrender.com/api/admin/cleanup-sessions
    timezone: UTC

  - name: backup-database
    schedule: "0 3 * * 0"
    command: curl -X POST https://maranet-api.onrender.com/api/admin/backup
    timezone: UTC

  - name: update-server-status
    schedule: "*/5 * * * *"
    command: curl -X POST https://maranet-api.onrender.com/api/admin/update-status
    timezone: UTC