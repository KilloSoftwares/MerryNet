# ============================================================
# Maranet Zero — Nginx Reverse Proxy
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=bootstrap:10m rate=50r/s;

# Upstream servers
upstream maranet_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream maranet_bootstrap {
    server 127.0.0.1:8080;
    keepalive 16;
}

upstream maranet_grafana {
    server 127.0.0.1:3001;
}

# ============================================================
# Main API — api.maranet.app
# ============================================================
server {
    listen 443 ssl http2;
    server_name api.maranet.app;

    # TLS (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.maranet.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.maranet.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 256;

    # Max body size
    client_max_body_size 10m;

    # Auth endpoints (stricter rate limit)
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://maranet_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # M-Pesa callback (no rate limit — Safaricom servers)
    location /api/v1/payments/mpesa/callback {
        proxy_pass http://maranet_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://maranet_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Health check
    location /health {
        proxy_pass http://maranet_api/api/v1/health;
        access_log off;
    }

    location / {
        return 404 '{"error": "Not found"}';
        add_header Content-Type application/json;
    }
}

# ============================================================
# Bootstrap API — zero-rated domain
# free.facebook.com.maranet.app (or zero.maranet.app)
# ============================================================
server {
    listen 80;
    listen 443 ssl http2;
    server_name free.facebook.com.maranet.app zero.maranet.app;

    ssl_certificate /etc/letsencrypt/live/zero.maranet.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zero.maranet.app/privkey.pem;

    # More relaxed for zero-rated access
    location / {
        limit_req zone=bootstrap burst=20 nodelay;
        proxy_pass http://maranet_bootstrap;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================
# Monitoring — grafana.maranet.app (internal only)
# ============================================================
server {
    listen 443 ssl http2;
    server_name grafana.maranet.app;

    ssl_certificate /etc/letsencrypt/live/grafana.maranet.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.maranet.app/privkey.pem;

    # Restrict to internal IPs
    allow 192.168.1.0/24;
    allow 10.0.0.0/16;
    deny all;

    location / {
        proxy_pass http://maranet_grafana;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket for Grafana Live
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ============================================================
# HTTP → HTTPS redirect
# ============================================================
server {
    listen 80;
    server_name api.maranet.app grafana.maranet.app;
    return 301 https://$host$request_uri;
}
