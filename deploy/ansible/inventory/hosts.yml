---
# Maranet Zero — Ansible Inventory
all:
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    domain: maranet.app
    email: admin@maranet.app

  children:
    main_server:
      hosts:
        proxmox-host:
          ansible_host: 192.168.1.100
          # Proxmox VM IPs
          api_vm_ip: 192.168.1.101
          gateway_vm_ip: 192.168.1.102
          monitoring_vm_ip: 192.168.1.103

    api_servers:
      hosts:
        api-01:
          ansible_host: 192.168.1.101

    gateway_servers:
      hosts:
        gateway-01:
          ansible_host: 192.168.1.102
          wg_listen_port: 51820
          wg_address: 10.0.0.1/16
          external_interface: eth0

    monitoring_servers:
      hosts:
        monitoring-01:
          ansible_host: 192.168.1.103

    reseller_nodes:
      hosts:
        # Dynamically populated from database
